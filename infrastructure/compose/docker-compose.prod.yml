services:
  db:
    image: mysql:8.0
    container_name: smartmeeting-db-prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ../../database/docker-init.sh:/docker-entrypoint-initdb.d/00_run_migrations.sh
      - ../../database/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
    container_name: smartmeeting-backend-prod
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_BACKEND: mysql
      DB_AUTO_FALLBACK_SQLITE: "false"
      SQLITE_PATH: /app/data/dev.db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      AUTH_LOGIN_RATE_LIMIT: ${AUTH_LOGIN_RATE_LIMIT}
      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL: ${LLM_MODEL}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS}
      LLM_TIMEOUT: ${LLM_TIMEOUT}
      LLM_FALLBACK_PROVIDER: ${LLM_FALLBACK_PROVIDER}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT}
      OLLAMA_TEMPERATURE: ${OLLAMA_TEMPERATURE}
      OLLAMA_MAX_TOKENS: ${OLLAMA_MAX_TOKENS}
      WHISPER_MODEL: ${WHISPER_MODEL}
      WHISPER_DEVICE: ${WHISPER_DEVICE}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE}
    expose:
      - "8000"
    volumes:
      - backend_data:/app/data
      - backend_storage:/app/backend/storage

  frontend:
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
    container_name: smartmeeting-frontend-prod
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "5173"

  nginx:
    image: nginx:1.27-alpine
    container_name: smartmeeting-nginx-prod
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  db_data:
  backend_data:
  backend_storage:
