apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartmeeting-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smartmeeting-backend
  template:
    metadata:
      labels:
        app: smartmeeting-backend
    spec:
      containers:
        - name: backend
          image: smartmeeting/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
          envFrom:
            - configMapRef:
                name: smartmeeting-backend-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: smartmeeting-db-secret
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartmeeting-db-secret
                  key: db-password
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: smartmeeting-app-secret
                  key: jwt-secret
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: smartmeeting-app-secret
                  key: llm-api-key
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartmeeting-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smartmeeting-frontend
  template:
    metadata:
      labels:
        app: smartmeeting-frontend
    spec:
      containers:
        - name: frontend
          image: smartmeeting/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5173
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 5173
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: 5173
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartmeeting-nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smartmeeting-nginx
  template:
    metadata:
      labels:
        app: smartmeeting-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
