apiVersion: v1
kind: ConfigMap
metadata:
  name: smartmeeting-backend-config
data:
  DB_HOST: smartmeeting-db
  DB_PORT: "3306"
  DB_NAME: smartmeeting
  DB_BACKEND: mysql
  DB_AUTO_FALLBACK_SQLITE: "false"
  JWT_ALGORITHM: HS256
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
  AUTH_LOGIN_RATE_LIMIT: 5/minute
  LLM_PROVIDER: openai
  LLM_MODEL: gpt-4o-mini
  LLM_TEMPERATURE: "0.3"
  LLM_MAX_TOKENS: "2000"
  LLM_TIMEOUT: "60"
  LLM_FALLBACK_PROVIDER: ollama
  OLLAMA_BASE_URL: http://ollama:11434
  OLLAMA_MODEL: llama3.1
  OLLAMA_TIMEOUT: "60"
  OLLAMA_TEMPERATURE: "0.3"
  OLLAMA_MAX_TOKENS: "2000"
  WHISPER_MODEL: base
  WHISPER_DEVICE: cpu
  WHISPER_LANGUAGE: zh
