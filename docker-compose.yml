services:
  db:
    image: mysql:8.0
    container_name: smartmeeting-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-smartmeeting}
      MYSQL_USER: ${DB_USER:-smartmeeting}
      MYSQL_PASSWORD: ${DB_PASSWORD:-smartmeeting}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: smartmeeting-backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_BACKEND: mysql
      DB_AUTO_FALLBACK_SQLITE: "false"
      SQLITE_PATH: /app/data/dev.db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
      - backend_storage:/app/backend/storage

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: smartmeeting-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  db_data:
  backend_data:
  backend_storage:
