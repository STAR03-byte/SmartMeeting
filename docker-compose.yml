services:
  db:
    image: mysql:8.0
    container_name: smartmeeting-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-smartmeeting}
      MYSQL_USER: ${DB_USER:-smartmeeting}
      MYSQL_PASSWORD: ${DB_PASSWORD:-smartmeeting}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/docker-init.sh:/docker-entrypoint-initdb.d/00_run_migrations.sh
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: smartmeeting-backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: smartmeeting
      DB_PASSWORD: smartmeeting
      DB_BACKEND: mysql
      DB_AUTO_FALLBACK_SQLITE: "false"
      SQLITE_PATH: /app/data/dev.db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.3}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-2000}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-60}
      LLM_FALLBACK_PROVIDER: ${LLM_FALLBACK_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-60}
      OLLAMA_TEMPERATURE: ${OLLAMA_TEMPERATURE:-0.3}
      OLLAMA_MAX_TOKENS: ${OLLAMA_MAX_TOKENS:-2000}
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-zh}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
      - backend_storage:/app/backend/storage

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: smartmeeting-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5174:5173"

volumes:
  db_data:
  backend_data:
  backend_storage:
